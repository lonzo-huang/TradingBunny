version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: polymarket-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: polymarket-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=520Wn1314
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1s
      - GF_LIVE_ENABLED=true
      - GF_LIVE_ALLOWED_CHANNEL_PREFIXES=stream/pde
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_LIVE_MAX_CONNECTIONS=100
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/polymarket.json:ro
      - ./pde-dashboard.json:/var/lib/grafana/dashboards/pde.json:ro
      - ./pde-live-dashboard.json:/var/lib/grafana/dashboards/pde-live.json:ro
    networks:
      - monitoring
    depends_on:
      - prometheus

volumes:
  grafana-storage:

networks:
  monitoring:
    driver: bridge
